<article class="post-card twitter-card" [class.like-pulse]="view().likePulse">
  <div class="tweet-row">
    <button class="avatar-btn" type="button" (click)="profileRequested.emit(view().post.authorId)">
      <app-avatar
        [src]="avatar(view().post.authorId)"
        [name]="authorName()"
        [seed]="view().post.authorId"
        [size]="48"
      />
    </button>

    <div class="tweet-body">
      <header class="tweet-head">
        <button class="author-trigger" type="button" (click)="profileRequested.emit(view().post.authorId)">
          <strong>{{ authorName() }}</strong>
          <span>{{ handle() }}</span>
          <span class="dot" aria-hidden="true">&middot;</span>
          <span>{{ view().post.createdAt | date: 'short' }}</span>
        </button>
        <button class="more-btn" type="button" (click)="postRequested.emit(view().post.postId)" aria-label="Open post">
          <app-ui-icon name="dots" [size]="18" />
        </button>
      </header>

      @if (view().post.content) {
        <button class="post-copy" type="button" (click)="postRequested.emit(view().post.postId)">
          <app-mention-text [text]="view().post.content" />
        </button>
      }

      @if (view().post.mediaUrls.length) {
        <div class="media-stack">
          @for (mediaUrl of view().post.mediaUrls; track mediaUrl) {
            <div class="media-frame" (click)="postRequested.emit(view().post.postId)">
              @if (isVideo(mediaUrl)) {
                <video [src]="mediaUrl" controls preload="metadata"></video>
              } @else {
                <img [src]="mediaUrl" alt="Post media" loading="lazy" />
              }
            </div>
          }
        </div>
      }

      <div class="actions">
        <button class="action" type="button" [class.active]="liked()" [disabled]="!currentUserId()" (click)="toggleLike()">
          <app-ui-icon name="heart" [size]="17" [filled]="liked()" />
          <span>Like</span>
          <small>{{ view().post.likesCount }}</small>
        </button>
        <label class="reaction-inline">
          <select
            [disabled]="!currentUserId()"
            [ngModel]="reactionType() ?? 'NONE'"
            (ngModelChange)="changeReaction($event)"
          >
            <option value="NONE">No reaction</option>
            <option value="LIKE">Like</option>
            <option value="LOVE">Love</option>
            <option value="HAHA">Haha</option>
            <option value="WOW">Wow</option>
            <option value="SAD">Sad</option>
            <option value="ANGRY">Angry</option>
          </select>
        </label>
        <button class="action" type="button" (click)="toggleComments()">
          <app-ui-icon name="comment" [size]="17" />
          <span>Reply</span>
          <small>{{ view().post.commentsCount }}</small>
        </button>
        <button class="action" type="button" [disabled]="!currentUserId()" (click)="shareRequested.emit()">
          <app-ui-icon name="share" [size]="17" />
          <span>Share</span>
          <small>{{ view().post.sharesCount || 0 }}</small>
        </button>
      </div>

      @if (commentsOpen()) {
        <section class="comments">
          @for (comment of view().comments; track comment.commentId) {
            <div class="comment-shell">
              <app-comment-item
                [comment]="comment"
                [authorName]="commentAuthorName(comment.authorId)"
                [authorUsername]="commentHandle(comment.authorId)"
                [authorAvatar]="avatar(comment.authorId)"
                [liked]="commentLiked(comment.commentId)"
                [canLike]="!!currentUserId()"
                [canReply]="!!currentUserId()"
                [canManage]="canManageComment(comment.authorId)"
                [canReport]="!!currentUserId() && currentUserId() !== comment.authorId"
                (profileRequested)="profileRequested.emit($event)"
                (likeRequested)="commentLikeToggled.emit({ postId: view().post.postId, commentId: $event })"
                (replyRequested)="postRequested.emit(view().post.postId)"
                (editRequested)="startEdit(comment.commentId, comment.content)"
                (deleteRequested)="commentDeleted.emit({ postId: view().post.postId, commentId: $event })"
                (reportRequested)="commentReported.emit({ postId: view().post.postId, commentId: $event })"
              />

              @if (isEditing(comment.commentId)) {
                <div class="comment-editor">
                  <textarea
                    [ngModel]="editDraft()"
                    (ngModelChange)="editDraft.set($event)"
                    rows="3"
                  ></textarea>
                  <div class="comment-editor-actions">
                    <button class="secondary-inline" type="button" (click)="cancelEdit()">Cancel</button>
                    <button class="twitter-primary-btn" type="button" (click)="saveEdit(comment.commentId)">Save</button>
                  </div>
                </div>
              }
            </div>
          }

          <div class="comment-form">
            <textarea
              [ngModel]="commentDraft()"
              (ngModelChange)="commentDraft.set($event)"
              rows="2"
              [disabled]="!currentUserId()"
              [placeholder]="currentUserId() ? 'Post your reply' : 'Login to reply'"
            ></textarea>
            <button class="twitter-primary-btn" type="button" [disabled]="!currentUserId()" (click)="submitComment()">Reply</button>
          </div>
        </section>
      }
    </div>
  </div>
</article>
